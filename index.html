<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#060608" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#faf9f7" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Velness is an AI companion for reflection and personal growth. Built with privacy at its core and developed in public." />
    <meta property="og:title" content="Velness — A better relationship with yourself" />
    <meta property="og:description" content="Velness is an AI companion for reflection and personal growth. Built with privacy at its core and developed in public." />
    <meta property="og:type" content="website" />
    
    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        const stored = localStorage.getItem('neeva-theme-preference');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = stored === 'light' ? 'light' : stored === 'dark' ? 'dark' : systemDark ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>Velness — A better relationship with yourself</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
